<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="TripPlannerAgent">
    <title>TripPlannerAgent</title>
    <!-- Circular mark — optimized for small sizes (favicon, tab icon) -->
    <circle cx="24" cy="24" r="23" fill="#0891b2" />
    <!-- Simplified globe — readable at 16-32px -->
    <circle cx="24" cy="24" r="13" fill="none" stroke="white" stroke-width="2" />
    <!-- Vertical meridian -->
    <ellipse cx="24" cy="24" rx="6.5" ry="13" fill="none" stroke="white" stroke-width="1.5" />
    <!-- Equator -->
    <line x1="11" y1="24" x2="37" y2="24" stroke="white" stroke-width="1.5" />
    <!-- Upper parallel -->
    <path d="M13 18.5Q24 16 35 18.5" fill="none" stroke="white" stroke-width="1.2" />
    <!-- Lower parallel -->
    <path d="M13 29.5Q24 32 35 29.5" fill="none" stroke="white" stroke-width="1.2" />
    <!-- Travel arc — curved route around the globe, matching brand identity -->
    <path d="M14 16 Q8 24 14 32 Q24 38 34 32 Q40 24 34 16" fill="none" stroke="white" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="2 3" />
    <!-- Small plane indicator at arc endpoint -->
    <polygon points="13,15 16,14 14,17" fill="white" />
</svg>